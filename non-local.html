<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Plan Sent | Kairos Nutrition</title>
    <link rel="stylesheet" href="./style.css" />
</head>
<body style="background-color: var(--color-black); color: var(--color-white); padding-top: 80px;">
    <!-- Sticky Navigation -->
    <nav style="position: fixed; top: 0; width: 100%; z-index: 1000; padding: 1.5rem 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.05);">
        <div class="container" style="display: flex; justify-content: flex-between; align-items: center;">
            <a href="/" style="text-decoration: none;">
                <img src="/kairos_logo.png" class="logo-nav" alt="Kairos Logo" style="height: 40px;" />
            </a>
            <div style="display: flex; gap: var(--space-md); align-items: center; margin-left: auto;">
                <a href="https://kairosmealpreps.bottle.com" target="_blank" style="color: var(--color-white); text-decoration: none; font-family: var(--font-primary); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.1em;">Order Weekly Meals</a>
                <a href="/#ruck-club" style="color: var(--color-white); text-decoration: none; font-family: var(--font-primary); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.1em;">Ruck Club</a>
            </div>
        </div>
    </nav>

    <section class="section-padding" style="min-height: calc(100vh - 200px); display: flex; align-items: center; justify-content: center; text-align: center;">
        <div class="container" data-reveal>
            <div style="font-size: 4rem; margin-bottom: 1rem;">📧</div>
            <h1 class="font-heading text-4xl md:text-5xl font-extrabold mb-6 uppercase tracking-wider text-white">Your Weight Loss Plan Has Been Sent To Your Email</h1>
            <p class="text-gray-300 text-xl max-w-2xl mx-auto mb-8">
                Thank you for taking the time to share your goals with us. Check your inbox (and spam folder) for access to your free individualized plan.
            </p>
            <a href="/" class="bg-gray-800 hover:bg-gray-700 text-white font-bold py-4 px-10 rounded text-lg uppercase tracking-wider transition duration-300 transform hover:scale-105 inline-block">
                Return Home
            </a>
        </div>
    </section>

    <!-- Footer CTA -->
    <footer class="section-padding" style="text-align: center; border-top: 1px solid rgba(255,255,255,0.05); margin-top: auto;">
        <div class="container" data-reveal>
            <img src="/kairos_logo.png" class="logo-footer" alt="Kairos Logo Small" />
            <p style="margin-top: var(--space-lg); opacity: 0.3; font-size: 0.8rem;">© 2026 KAIROS NUTRITION. SPOKANE / CDA.</p>
        </div>
    </footer>
    <script type="module" src="/main.js"></script>
</body>
</html>
